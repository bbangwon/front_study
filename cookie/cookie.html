<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="cookie.css" />
    <script src="cookie.js"></script>
    <title>JS Cookie</title>
  </head>
  <body>
    <div class="container">
      <h3 class="title">
        JS Cookie
        <small class="text-body-secondary">with local data storage</small>
      </h3>
      <table class="table table-bordered table-striped table-hover table-dark">
        <caption>
          List of Cookies
        </caption>
        <thead class="table-light text-center">
          <tr>
            <th width="60%">Check list</th>
            <th>Click</th>
          </tr>
        </thead>
        <tbody class="text-center">
          <tr>
            <td class="align-middle">쿠키 확인하기</td>
            <td><button onclick="getCookie()">Get Cookie</button></td>
          </tr>
          <tr>
            <td class="align-middle">쿠키 생성하기</td>
            <td><button onclick="setCookie()">Set Cookie</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
